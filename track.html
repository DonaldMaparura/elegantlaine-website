<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Order — ElegantLaine</title>
  <meta name="description" content="Track your ElegantLaine order." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..600&family=Fraunces:ital,opsz,wght@0,9..144,300..600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/store.css" />
  <style>
    .simple-page { min-height: 70vh; padding: 48px 24px 80px; max-width: 560px; margin: 0 auto; }
    .simple-page h1 { font-family: var(--font-display); font-size: 2rem; font-weight: 400; color: var(--deep); margin-bottom: 16px; }
    .simple-page p { color: var(--text-light); line-height: 1.75; margin-bottom: 16px; font-size: .92rem; }
    .track-form label { display: block; font-size: .78rem; font-weight: 500; color: var(--text-light); margin-bottom: 6px; }
    .track-form input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 6px; font-family: var(--font-body); margin-bottom: 16px; }
    .back-link { display: inline-block; margin-top: 20px; color: var(--gold-dark); font-size: .9rem; }
  </style>
</head>
<body>
<div class="announce-bar"><p>✦ SA · Free delivery over R 600 · <a href="shop.html">Shop →</a></p></div>
<nav class="nav" id="mainNav">
  <div class="nav-logo"><a href="index.html"><span class="logo-mark">✦</span><span class="logo-text">ElegantLaine</span></a></div>
  <div class="nav-actions"><a href="index.html" class="btn-ghost" style="font-size:.82rem">← Back to Store</a></div>
</nav>
<main class="simple-page">
  <h1>Track your order</h1>
  <p>Enter the order number from your confirmation email.</p>
  <form class="track-form" onsubmit="event.preventDefault(); document.getElementById('trackMsg').textContent='Tracking will appear here once shipping is integrated.';">
    <label for="ord">Order number</label>
    <input id="ord" type="text" placeholder="e.g. EL-2847" autocomplete="off" />
    <button type="submit" class="btn-primary">Track</button>
  </form>
  <p id="trackMsg" style="font-size:.85rem;color:var(--text-lighter)"></p>
  <a href="contact.html" class="back-link">Need help? Contact us</a>
</main>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('mainNav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 40));
  });
</script>
</body>
</html>
