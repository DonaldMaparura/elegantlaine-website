<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — ElegantLaine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..600&family=Fraunces:ital,opsz,wght@0,9..144,300..600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/store.css" />
  <style>
    .pd-wrap { max-width: 960px; margin: 0 auto; padding: 100px 24px 80px; display: grid; gap: 40px; grid-template-columns: 1fr 1fr; align-items: start; }
    @media (max-width: 768px) { .pd-wrap { grid-template-columns: 1fr; padding-top: 88px; } }
    .pd-visual { aspect-ratio: 1; border-radius: 0; border: 2px solid var(--deep); display: flex; align-items: center; justify-content: center; font-size: 5rem; background: var(--cream); }
    .pd-visual span { line-height: 1; }
    .pd-title { font-family: var(--font-display); font-size: 2.25rem; font-weight: 400; color: var(--deep); margin: 0 0 12px; }
    .pd-meta { color: var(--text-light); font-size: .9rem; margin-bottom: 20px; text-transform: capitalize; }
    .pd-price { font-size: 1.5rem; font-weight: 500; color: var(--deep); margin-bottom: 8px; }
    .pd-price del { color: var(--text-lighter); font-weight: 400; font-size: 1rem; margin-left: 10px; }
    .pd-desc { color: var(--text-light); line-height: 1.75; font-size: .95rem; margin-bottom: 24px; }
  </style>
</head>
<body>
<div class="announce-bar"><p>✦ SA · Free delivery over R 600 · <a href="shop.html">Shop →</a></p></div>
<nav class="nav" id="mainNav">
  <div class="nav-logo"><a href="index.html"><span class="logo-mark">✦</span><span class="logo-text">ElegantLaine</span></a></div>
  <ul class="nav-links">
    <li><a href="shop.html">All Products</a></li>
  </ul>
  <div class="nav-actions">
    <a href="account.html" class="btn-icon" aria-label="Account"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
    <button class="btn-icon cart-btn" id="cartToggle" type="button" aria-label="Cart"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-count" id="cartCount">0</span></button>
  </div>
</nav>
<main class="pd-wrap" id="pdRoot">
  <p style="grid-column:1/-1;color:var(--text-light)">Loading…</p>
</main>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header"><h3>Your Bag</h3><button type="button" onclick="closeCart()">✕</button></div>
  <div class="cart-items" id="cartItems"><div class="cart-empty"><span>🛍️</span><p>Your bag is empty</p><a href="shop.html" class="btn-primary">Start Shopping</a></div></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-subtotal"><span>Subtotal</span><strong id="cartSubtotal">R 0</strong></div>
    <p class="cart-shipping-note">Free delivery on orders over R 600</p>
    <a href="checkout.html" class="btn-primary full-width">Checkout →</a>
  </div>
</div>
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/store.js"></script>
<script>
function renderProductPage() {
  const rawId = new URLSearchParams(location.search).get('id');
  const products = window.EL_PRODUCTS || [];
  const p = products.find((x) => String(x.id) === String(rawId));
  const root = document.getElementById('pdRoot');
  if (!p) {
    root.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px 0"><p style="color:var(--text-light);margin-bottom:20px">Product not found.</p><a href="shop.html" class="btn-primary">Browse shop</a></div>';
    document.title = 'Product not found — ElegantLaine';
    return;
  }
  document.title = p.name + ' — ElegantLaine';
  const grad = 'linear-gradient(145deg, ' + p.color + '22 0%, ' + p.color + '55 100%)';
  const addJs = JSON.stringify(p.id);
  root.innerHTML =
    '<div class="pd-visual" style="background:' + grad + '"><span>' + p.emoji + '</span></div>' +
    '<div>' +
    '<p class="pd-meta">' + p.category + ' · ' + '★'.repeat(p.stars) + ' (' + p.reviews + ' reviews)</p>' +
    '<h1 class="pd-title">' + p.name + '</h1>' +
    '<p class="pd-price">' + formatZAR(p.price) + (p.oldPrice ? ' <del>' + formatZAR(p.oldPrice) + '</del>' : '') + '</p>' +
    '<p class="pd-desc">Premium quality — ships nationwide in SA. Free returns within 30 days on eligible items.</p>' +
    '<button type="button" class="btn-primary" onclick="addToCart(' + addJs + ')">Add to bag — ' + formatZAR(p.price) + '</button> ' +
    '<a href="shop.html" class="btn-ghost" style="margin-left:8px">← Back to shop</a>' +
    '</div>';
  updateCartUI();
  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 40));
  document.getElementById('cartToggle').addEventListener('click', openCart);
}
document.addEventListener('el-products-ready', renderProductPage);
document.addEventListener('DOMContentLoaded', () => {
  if (!window.__EL_FB_OK__) renderProductPage();
});
</script>
</body>
</html>
