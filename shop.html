<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop All Products — Elegantlaine | Wigs, Bags & Beauty SA</title>
  <meta name="description" content="Browse all Elegantlaine products — wigs, bags and beauty essentials. Filter by category, price and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..600&family=Fraunces:ital,opsz,wght@0,9..144,300..600&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/store.js"></script>
<script>
// Override renderProducts for shop page with filters
const urlParams = new URLSearchParams(window.location.search);
const urlCat = urlParams.get('cat');
const urlQ = urlParams.get('q');

if (urlCat) {
  document.querySelectorAll(`input[value="${urlCat}"]`).forEach(cb => cb.checked = true);
  const label = urlCat.replace(/-/g, ' ');
  document.getElementById('shopBreadcrumb').textContent = label.charAt(0).toUpperCase() + label.slice(1);
}
if (urlQ) {
  document.getElementById('shopBreadcrumb').textContent = `Search: "${urlQ}"`;
}

function applyFilters() {
  const cats = Array.from(document.querySelectorAll('.filter-block input[type=checkbox][value]:checked')).map(c => c.value).filter(v => ['wigs','bags','beauty'].includes(v));
  const badges = Array.from(document.querySelectorAll('.badge-filter:checked')).map(b => b.value);
  const minP = parseFloat(document.getElementById('minPrice').value) || 0;
  const maxP = parseFloat(document.getElementById('maxPrice').value) || Infinity;
  const inStockOnly = document.getElementById('inStockOnly').checked;
  const sort = document.getElementById('sortSelect').value;
  const q = urlQ ? urlQ.toLowerCase() : '';

  let list = [...PRODUCTS];
  if (urlCat && typeof window.elProductMatchesNavCat === 'function') {
    list = list.filter((p) => window.elProductMatchesNavCat(p, urlCat));
  }
  if (cats.length) list = list.filter(p => cats.includes(p.category));
  if (badges.length) list = list.filter(p => p.badge && badges.includes(p.badge));
  if (minP) list = list.filter(p => p.price >= minP);
  if (maxP !== Infinity) list = list.filter(p => p.price <= maxP);
  if (inStockOnly) list = list.filter(p => p.inStock !== false);
  if (q) {
    list = list.filter(
      (p) =>
        p.name.toLowerCase().includes(q) ||
        p.category.toLowerCase().includes(q) ||
        (p.tags && p.tags.some((t) => t.includes(q)))
    );
  }

  if (sort === 'price-asc') list.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
  else if (sort === 'new') list.sort((a, b) => String(b.id).localeCompare(String(a.id), undefined, { numeric: true }));

  const grid = document.getElementById('productsGrid');
  const noRes = document.getElementById('noResults');
  const count = document.getElementById('resultCount');

  if (list.length === 0) { grid.innerHTML = ''; noRes.style.display = 'block'; count.textContent = 'No products found'; }
  else {
    noRes.style.display = 'none';
    count.textContent = `Showing ${list.length} product${list.length !== 1 ? 's' : ''}`;
    grid.innerHTML = '';
    list.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.style.animation = `fadeSlideUp .5s ${i*50}ms ease both`;
      const wl = JSON.parse(localStorage.getItem('el_wishlist') || '[]');
      const inWishlist = wl.some((id) => String(id) === String(p.id));
      card.innerHTML = window.elBuildProductCardHTML(p, inWishlist);
      grid.appendChild(card);
    });
  }
}

function clearFilters() {
  document.querySelectorAll('.filter-block input[type=checkbox]').forEach(cb => cb.checked = false);
  document.getElementById('minPrice').value = '';
  document.getElementById('maxPrice').value = '';
  document.getElementById('inStockOnly').checked = false;
  applyFilters();
}

document.addEventListener('el-products-ready', () => {
  applyFilters();
});
document.addEventListener('DOMContentLoaded', () => {
  setupStickyNav();
  if (!window.__EL_FB_OK__) applyFilters();
});
</script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-init.js"></script>
</body>
</html>
