<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — ElegantLaine</title>
  <meta name="description" content="Contact ElegantLaine customer support." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..600&family=Fraunces:ital,opsz,wght@0,9..144,300..600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/store.css" />
  <style>
    .simple-page { min-height: 70vh; padding: 48px 24px 80px; max-width: 560px; margin: 0 auto; }
    .simple-page h1 { font-family: var(--font-display); font-size: 2rem; font-weight: 400; color: var(--deep); margin-bottom: 16px; }
    .simple-page p { color: var(--text-light); line-height: 1.75; margin-bottom: 16px; font-size: .92rem; }
    .contact-form label { display: block; font-size: .78rem; font-weight: 500; color: var(--text-light); margin-bottom: 6px; }
    .contact-form input, .contact-form textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 6px; font-family: var(--font-body); margin-bottom: 14px; }
    .contact-form textarea { min-height: 120px; resize: vertical; }
    .back-link { display: inline-block; margin-top: 20px; color: var(--gold-dark); font-size: .9rem; }
  </style>
</head>
<body>
<div class="announce-bar"><p>✦ SA · Free delivery over R 600 · <a href="shop.html">Shop →</a></p></div>
<nav class="nav" id="mainNav">
  <div class="nav-logo"><a href="index.html"><span class="logo-mark">✦</span><span class="logo-text">ElegantLaine</span></a></div>
  <div class="nav-actions"><a href="index.html" class="btn-ghost" style="font-size:.82rem">← Back to Store</a></div>
</nav>
<main class="simple-page">
  <h1>Contact us</h1>
  <p>We typically reply within one business day.</p>
  <form class="contact-form" onsubmit="event.preventDefault(); alert('Connect this form to your email API or Formspree.');">
    <label for="em">Email</label>
    <input id="em" type="email" required placeholder="you@example.com" />
    <label for="msg">Message</label>
    <textarea id="msg" required placeholder="How can we help?"></textarea>
    <button type="submit" class="btn-primary">Send message</button>
  </form>
  <a href="index.html" class="back-link">← Back to home</a>
</main>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('mainNav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 40));
  });
</script>
</body>
</html>
